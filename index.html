<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="max-w-4xl mx-auto px-10 py-20">

    <!-- Header -->
    <header class="mb-24">
        <h1 class="text-2xl font-semibold tracking-tight">Dyyrex.</h1>
        <p class="text-gray-500 mt-2 text-lg">Infrastructure & Minecraft Development.</p>
    </header>

    <!-- Services Grid -->
    <section class="grid md:grid-cols-2 gap-4 mb-24">
        <div class="card">
            <h2 class="text-sm uppercase tracking-widest text-gray-400 mb-2">Fix Bug</h2>
            <p class="text-2xl font-light">3k - 10k</p>
        </div>
        <div class="card">
            <h2 class="text-sm uppercase tracking-widest text-gray-400 mb-2">Config</h2>
            <p class="text-2xl font-light">Start 5k</p>
        </div>
        <div class="card col-span-2">
            <h2 class="text-sm uppercase tracking-widest text-gray-400 mb-2">Full Setup</h2>
            <p class="text-2xl font-light">Start 30k</p>
        </div>
    </section>

    <!-- Simple Form -->
    <section class="max-w-lg">
        <h3 class="text-xl mb-8">Saran / Masukan</h3>
        <form action="https://formspree.io/f/xbdbezya" method="POST" class="space-y-6">
            <input type="text" name="name" placeholder="Nama..." class="w-full border-b border-gray-300 py-2 focus:border-black outline-none">
            <textarea name="msg" placeholder="Pesan..." class="w-full border-b border-gray-300 py-2 focus:border-black outline-none"></textarea>
            <button class="bg-black text-white px-8 py-3 rounded-full hover:bg-gray-800 transition">Kirim</button>
        </form>
    </section>

</body>
</html>
